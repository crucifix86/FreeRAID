{
  "version": "3.8",
  "services": {
    "calibre": {
      "image": "lscr.io/linuxserver/calibre",
      "container_name": "calibre",
      "restart": "unless-stopped",
      "network_mode": "bridge",
      "environment": {
        "PASSWORD": "Twisted88",
        "CLI_ARGS": "",
        "PUID": "99",
        "PGID": "100",
        "UMASK": "022"
      },
      "ports": [
        "8086:8080/tcp",
        "8088:8081/tcp"
      ],
      "volumes": [
        "/mnt/user/appdata/calibre:/config:rw"
      ]
    }
  }
}