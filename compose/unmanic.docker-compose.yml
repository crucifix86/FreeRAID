{
  "version": "3.8",
  "services": {
    "unmanic": {
      "image": "josh5/unmanic:latest",
      "container_name": "unmanic",
      "restart": "unless-stopped",
      "network_mode": "bridge",
      "environment": {
        "PUID": "99",
        "PGID": "100",
        "NVIDIA_VISIBLE_DEVICES": "all",
        "NVIDIA_PATCH_VERSION": ""
      },
      "ports": [
        "8888:8888/tcp"
      ],
      "volumes": [
        "/mnt/user/appdata/unmanic:/config:rw",
        "/mnt/user/Transcode/:/tmp/unmanic:rw",
        "/mnt/user/Media/:/Data:rw"
      ]
    }
  }
}