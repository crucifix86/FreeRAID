{
  "version": "3.8",
  "services": {
    "openvpn-aio-client": {
      "image": "testdasi/openvpn-client-aio:latest",
      "container_name": "openvpn-aio-client",
      "restart": "unless-stopped",
      "network_mode": "bridge",
      "environment": {
        "DNS_SERVERS": "127.2.2.2",
        "HOST_NETWORK": "192.168.1.0/24",
        "DNS_SERVER_PORT": "53",
        "SOCKS_PROXY_PORT": "9118",
        "HTTP_PROXY_PORT": "8118",
        "TOR_SOCKS_PORT": "9119",
        "TOR_HTTP_PORT": "8119"
      },
      "ports": [
        "8153:53/tcp",
        "8153:53/tcp",
        "9118:9118/tcp",
        "8120:8118/tcp",
        "9119:9119/tcp",
        "8119:8119/tcp"
      ],
      "volumes": [
        "/mnt/user/appdata/openvpn-aio-client:/etc/openvpn:rw"
      ]
    }
  }
}