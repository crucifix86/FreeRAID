{
  "version": "3.8",
  "services": {
    "rdesktop": {
      "image": "lscr.io/linuxserver/rdesktop:ubuntu-xfce",
      "container_name": "rdesktop",
      "restart": "unless-stopped",
      "network_mode": "bridge",
      "environment": {
        "PUID": "99",
        "PGID": "100",
        "UMASK": "022"
      },
      "ports": [
        "3389:3389/tcp"
      ],
      "volumes": [
        "/mnt/user/appdata/rdesktop:/config:rw"
      ]
    }
  }
}