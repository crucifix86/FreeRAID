{
  "version": "3.8",
  "services": {
    "creative": {
      "image": "binhex/arch-minecraftbedrockserver",
      "container_name": "creative",
      "restart": "unless-stopped",
      "network_mode": "bridge",
      "environment": {
        "CREATE_BACKUP_HOURS": "12",
        "PURGE_BACKUP_DAYS": "14",
        "ENABLE_WEBUI_CONSOLE": "yes",
        "ENABLE_WEBUI_AUTH": "yes",
        "WEBUI_USER": "admin",
        "WEBUI_PASS": "",
        "WEBUI_CONSOLE_TITLE": "Minecraft Bedrock",
        "STARTUP_CMD": "",
        "UMASK": "000",
        "PUID": "99",
        "PGID": "100"
      },
      "ports": [
        "19132:19132/tcp",
        "19132:19132/tcp",
        "19133:19133/tcp",
        "19133:19133/tcp",
        "8222:8222/tcp"
      ],
      "volumes": [
        "/mnt/user/appdata/Creative:/config:rw"
      ]
    }
  }
}