{
  "version": "3.8",
  "services": {
    "firefox": {
      "image": "lscr.io/linuxserver/firefox",
      "container_name": "firefox",
      "restart": "unless-stopped",
      "network_mode": "bridge",
      "environment": {
        "FIREFOX_CLI": "https://www.linuxserver.io/",
        "PUID": "99",
        "PGID": "100",
        "UMASK": "022"
      },
      "ports": [
        "3000:3000/tcp",
        "3001:3001/tcp"
      ],
      "volumes": [
        "/mnt/user/appdata/firefox:/config:rw"
      ]
    }
  }
}