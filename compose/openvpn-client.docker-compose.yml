{
  "version": "3.8",
  "services": {
    "openvpn-client": {
      "image": "ich777/openvpn-client",
      "container_name": "openvpn-client",
      "restart": "unless-stopped",
      "network_mode": "bridge",
      "privileged": true,
      "environment": {
        "FIREWALL": "",
        "CONNECTED_CONTAINERS": "",
        "PING_IP": "",
        "PING_INTERVAL": "30"
      },
      "ports": [
        "3307:3307/tcp"
      ],
      "volumes": [
        "/mnt/cache/appdata/openvpn-client:/vpn:rw"
      ]
    }
  }
}