# Static IP config for inside the FreeRAID VM.
# Copy to /etc/netplan/01-freeraid.yaml inside the VM, then:
#   netplan apply
#
# This gives the VM its own IP (192.168.1.150) on the local network
# via the host's proxy ARP TAP setup.

network:
  version: 2
  renderer: networkd
  ethernets:
    ens3:
      dhcp4: false
      addresses:
        - 192.168.1.150/24
      routes:
        - to: default
          via: 192.168.1.1
      nameservers:
        addresses:
          - 192.168.1.1
          - 8.8.8.8
